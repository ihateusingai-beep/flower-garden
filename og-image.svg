<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf"/>
      <stop offset="50%" style="stop-color:#88d8b0"/>
      <stop offset="100%" style="stop-color:#ffeaa7"/>
    </linearGradient>
    <radialGradient id="sun" cx="90%" cy="10%" r="20%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFF3B0;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="315" rx="580" ry="300" fill="url(#sun)"/>

  <!-- Flowers -->
  <!-- Sunflower center -->
  <g transform="translate(200,420)">
    <ellipse cx="0" cy="-50" rx="14" ry="30" fill="#FFD700" transform="rotate(0)"/>
    <ellipse cx="0" cy="-50" rx="14" ry="30" fill="#FFD700" transform="rotate(45)"/>
    <ellipse cx="0" cy="-50" rx="14" ry="30" fill="#FFD700" transform="rotate(90)"/>
    <ellipse cx="0" cy="-50" rx="14" ry="30" fill="#FFD700" transform="rotate(135)"/>
    <ellipse cx="0" cy="-50" rx="14" ry="30" fill="#FFD700" transform="rotate(180)"/>
    <ellipse cx="0" cy="-50" rx="14" ry="30" fill="#FFD700" transform="rotate(225)"/>
    <ellipse cx="0" cy="-50" rx="14" ry="30" fill="#FFD700" transform="rotate(270)"/>
    <ellipse cx="0" cy="-50" rx="14" ry="30" fill="#FFD700" transform="rotate(315)"/>
    <circle cx="0" cy="0" r="28" fill="#5D4037"/>
    <circle cx="0" cy="0" r="20" fill="#795548"/>
  </g>
  <!-- Tulip -->
  <g transform="translate(500,430)">
    <rect x="-4" y="0" width="8" height="70" fill="#388E3C"/>
    <ellipse cx="-20" cy="20" rx="16" ry="35" fill="#E91E63" transform="rotate(-20)"/>
    <ellipse cx="0" cy="10" rx="16" ry="40" fill="#EC407A"/>
    <ellipse cx="20" cy="20" rx="16" ry="35" fill="#E91E63" transform="rotate(20)"/>
  </g>
  <!-- Daisy -->
  <g transform="translate(800,420)">
    <ellipse cx="0" cy="-40" rx="10" ry="22" fill="white" transform="rotate(0)"/>
    <ellipse cx="0" cy="-40" rx="10" ry="22" fill="white" transform="rotate(60)"/>
    <ellipse cx="0" cy="-40" rx="10" ry="22" fill="white" transform="rotate(120)"/>
    <ellipse cx="0" cy="-40" rx="10" ry="22" fill="white" transform="rotate(180)"/>
    <ellipse cx="0" cy="-40" rx="10" ry="22" fill="white" transform="rotate(240)"/>
    <ellipse cx="0" cy="-40" rx="10" ry="22" fill="white" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="18" fill="#FFEB3B"/>
  </g>
  <!-- Small flower left -->
  <g transform="translate(350,480)">
    <ellipse cx="0" cy="-25" rx="7" ry="15" fill="#FF9800" transform="rotate(0)"/>
    <ellipse cx="0" cy="-25" rx="7" ry="15" fill="#FF9800" transform="rotate(72)"/>
    <ellipse cx="0" cy="-25" rx="7" ry="15" fill="#FF9800" transform="rotate(144)"/>
    <ellipse cx="0" cy="-25" rx="7" ry="15" fill="#FF9800" transform="rotate(216)"/>
    <ellipse cx="0" cy="-25" rx="7" ry="15" fill="#FF9800" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="10" fill="#FFF176"/>
  </g>
  <!-- Small flower right -->
  <g transform="translate(950,470)">
    <ellipse cx="0" cy="-25" rx="7" ry="15" fill="#CE93D8" transform="rotate(0)"/>
    <ellipse cx="0" cy="-25" rx="7" ry="15" fill="#CE93D8" transform="rotate(72)"/>
    <ellipse cx="0" cy="-25" rx="7" ry="15" fill="#CE93D8" transform="rotate(144)"/>
    <ellipse cx="0" cy="-25" rx="7" ry="15" fill="#CE93D8" transform="rotate(216)"/>
    <ellipse cx="0" cy="-25" rx="7" ry="15" fill="#CE93D8" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="10" fill="#FFF9C4"/>
  </g>

  <!-- Title text -->
  <text x="600" y="220" font-family="Microsoft JhengHei, PingFang TC, sans-serif" font-size="88" font-weight="bold" fill="#2d3436" text-anchor="middle">🌸 花花園探險記 🌸</text>
  <text x="600" y="290" font-family="Microsoft JhengHei, PingFang TC, sans-serif" font-size="36" fill="#636e72" text-anchor="middle">互動學習評估遊戲</text>
  <text x="600" y="340" font-family="Microsoft JhengHei, PingFang TC, sans-serif" font-size="24" fill="#00b894" text-anchor="middle">🌱特殊教育學生專用</text>
</svg>
